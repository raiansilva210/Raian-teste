<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flor CSS</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#87CEEB, #98FB98);
}

.flor {
    position:relative;
    height:300px;
    width:300px;
}

.petala{
    width:80px;
    height:80px;
    background:pink;
    border-radius:50%;
    position:absolute;
    top:0;
    left:0;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.p1{ transform:translate(00,-50px); }
.p2{ transform:translate(43px,-25px); }
.p3{ transform:translate(43px,25px); }
.p4{ transform:translate(0,50px); }
.p5{ transform:translate(-43px,25px); }
.p6{ transform:translate(-43px,-25px); }


.centro{
    width:60px;
    height:60px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:10px;
    left:10px;
    z-index:2;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.caule{
    width:12px;
    height:220px;
    background:green;
    position:absolute;
    left:34px;
    top:60px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.folha{
    width:60px;
    height:30px;
    background:limegreen;
    position:absolute;
    top:160px;
    left:40px;
    border-radius:0 150% 0 150%;
    transform:rotate(30deg);
}
h1{
    position:absolute;
    top:20px;
    font-family:sans-serif;
    color:#333;
}

img{
    position:absolute;
    bottom:200px;
    width:290px;
    height:auto;
}
</style>
</head>

<body>

<div class="flor">
    <div class="petala p1"></div>
    <div class="petala p2"></div>
    <div class="petala p3"></div>
    <div class="petala p4"></div>
    <div class="petala p5"></div>
    <div class="petala p6"></div>
    <div class="centro"></div>
    <div class="caule"></div>
    <div class="folha"></div>
</div>
