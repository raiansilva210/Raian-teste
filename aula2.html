<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Raian😎</title>
     <style type="text/css">
           
          div{width: 100px; height: 100px; margin: absolute;}
          #borda1{
            border-top: 2px dashed red;
            border-right: 2px dotted green;
            border-left: 2px double blue;
            border-bottom: 2px solid yellow;
            margin-top: 300px;
            margin-left: 300px;
          }
          #borda2{
            border-top: 50px solid red;
            border-right: 50px solid cyan;
            border-left: 50px solid magenta;
            border-bottom: 50px solid black;
          }
          #trapezio{
            border-top: 0px solid transparent;
            border-right: 50px solid transparent;
            border-left: 50px solid transparent;
            border-bottom: 100px solid orange;
            
          }
          #triangulo{
            border-top: 0px solid transparent;
            border-right: 100px solid transparent;
            border-left: 100px solid transparent;
            border-bottom: 100px solid rgb(22, 22, 22);
            width: 0px; 
            
          }
          #bandeira{
            border-top: 100px solid rgb(228, 230, 224);
            border-right: 50px solid rgb(228, 230, 224);
            border-bottom: 10px solid rgb(228, 230, 224);
            height: 0px;
            border-left: 50px solid rgb(228, 230, 224);
          }
          
          </style>

</head>
<body>
  <div id="borda1"></div>
  <div id="borda2"></div>
  <div id="trapezio"></div>
  <div id="triangulo"></div>
  <div id="bandeira"></div>   
  
</body>
</html>
